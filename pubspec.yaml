name: intent_app
description: "Intent - Smart Notification Manager"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # State Management
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Networking (for future Java backend connection)
  http: ^1.2.1
  dio: ^5.4.3+1

  # Local Storage & Caching
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Data Models & Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  equatable: ^2.0.5

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  share_plus: ^10.1.2
  permission_handler: ^12.0.1
  flutter_contacts: ^2.0.2
  google_generative_ai: ^0.4.7
  pdf: ^3.12.0
  fl_chart: ^1.2.0
  file_picker: ^11.0.2
  in_app_purchase: ^3.2.3
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  riverpod_annotation: ^2.3.5
  custom_lint: ^0.6.4
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"
  image: "assets/icons/splash.png"
  android_12:
    image: "assets/icons/splash.png"
    icon_background_color: "#000000"
    color: "#000000"

flutter:
  uses-material-design: true

  # Using google_fonts package instead of local font assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
